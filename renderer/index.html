<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Printer Bridge</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .status {
        padding: 10px;
        border-radius: 8px;
        background: #f3f3f3;
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <h1>Printer Bridge Running</h1>

    <p>Application is active in the system tray.</p>

    <div class="status" id="status">
      Waiting for WebSocket connections...
    </div>

    <script>
      const status = document.getElementById("status");

      const ws = new WebSocket("ws://localhost:3210");

      ws.onopen = () => {
        status.innerText = "Connected to local WebSocket server";
      };

      ws.onerror = () => {
        status.innerText = "WebSocket connection failed";
      };
    </script>
  </body>
</html>
