<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Printer Bridge Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #0d0b14;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.07);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% 0%, #1c1535 0%, var(--bg-color) 70%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 32px;
      background: linear-gradient(135deg, #a78bfa, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #ffffff, #d1d5db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin: 0 auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background-color: var(--success);
      box-shadow: 0 0 12px var(--success);
    }

    .status-dot.disconnected {
      background-color: var(--error);
      box-shadow: 0 0 12px var(--error);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .select-wrapper {
      position: relative;
      width: 100%;
    }

    select {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      appearance: none;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .select-wrapper::after {
      content: '▼';
      font-size: 10px;
      color: var(--text-secondary);
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.03);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(17, 12, 28, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
    }

    .toast-success .toast-icon {
      background: var(--success);
    }

    .toast-error .toast-icon {
      background: var(--error);
    }

    .toast-info .toast-icon {
      background: var(--primary);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.6;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-icon">🖨</div>
      <h1>Printer Bridge</h1>
      <p class="subtitle">Silent thermal printing connector</p>
    </header>

    <div class="status-badge">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>

    <div class="form-group">
      <label for="printer-select">Active Receipt Printer</label>
      <div class="select-wrapper">
        <select id="printer-select">
          <option value="">Fetching system printers...</option>
        </select>
      </div>
    </div>

    <div class="btn-container">
      <button id="save-btn" class="btn-primary">
        <span>💾</span> Save Active Printer
      </button>
      <button id="test-btn" class="btn-secondary">
        <span>⚡</span> Send Test Print
      </button>
      <button id="refresh-btn" class="btn-secondary">
        <span>🔄</span> Refresh Printers
      </button>
    </div>

    <div class="footer">
      Runs quietly in the background tray.
    </div>
  </div>

  <!-- Animated Toast -->
  <div id="toast" class="toast">
    <span class="toast-icon" id="toast-icon">✓</span>
    <span id="toast-message">Printer configuration saved!</span>
  </div>

  <script>
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const printerSelect = document.getElementById("printer-select");
    const saveBtn = document.getElementById("save-btn");
    const testBtn = document.getElementById("test-btn");
    const refreshBtn = document.getElementById("refresh-btn");
    const toast = document.getElementById("toast");
    const toastMsg = document.getElementById("toast-message");
    const toastIcon = document.getElementById("toast-icon");

    // 1. Live WebSocket Status Glow
    function connectWebSocket() {
      const ws = new WebSocket("ws://localhost:3210");

      ws.onopen = () => {
        statusDot.className = "status-dot connected";
        statusText.innerText = "Active - WS Connected";
      };

      ws.onclose = () => {
        statusDot.className = "status-dot disconnected";
        statusText.innerText = "Inactive - Reconnecting...";
        setTimeout(connectWebSocket, 5000);
      };

      ws.onerror = () => {
        statusDot.className = "status-dot disconnected";
        statusText.innerText = "WS Connection Error";
      };
    }

    connectWebSocket();

    // 2. Show Premium Toast Alerts
    function showToast(message, type = "success") {
      toastMsg.innerText = message;
      toast.className = `toast show toast-${type}`;
      toastIcon.innerText = type === "success" ? "✓" : (type === "error" ? "✕" : "i");

      setTimeout(() => {
        toast.className = "toast";
      }, 3000);
    }

    // 3. Fetch and Render System Printers
    async function loadPrinters() {
      try {
        printerSelect.innerHTML = '<option value="">Scanning for printers...</option>';

        // Get printers from native bridge
        const printers = await window.printerBridge.getPrinters();
        const selected = await window.printerBridge.getSelectedPrinter();

        printerSelect.innerHTML = "";

        if (!printers || printers.length === 0) {
          printerSelect.innerHTML = '<option value="">No printers found</option>';
          return;
        }

        printers.forEach((printer) => {
          const opt = document.createElement("option");
          opt.value = printer.name;
          opt.innerText = `${printer.name} ${printer.isDefault ? ' (Default)' : ''}`;
          if (printer.name === selected) {
            opt.selected = true;
          }
          printerSelect.appendChild(opt);
        });

        // If no printer was selected, auto-select default or first one
        if (!selected && printers.length > 0) {
          const defaultPrinter = printers.find(p => p.isDefault) || printers[0];
          printerSelect.value = defaultPrinter.name;
        }
      } catch (err) {
        console.error(err);
        printerSelect.innerHTML = '<option value="">Error loading printers</option>';
        showToast("Failed to load system printers", "error");
      }
    }

    // Load on start
    window.addEventListener("DOMContentLoaded", loadPrinters);

    // 4. Save Selected Printer Action
    saveBtn.addEventListener("click", async () => {
      const value = printerSelect.value;
      if (!value) {
        showToast("Please select a printer first", "info");
        return;
      }

      try {
        await window.printerBridge.setSelectedPrinter(value);
        showToast("Active printer saved successfully!");
      } catch (err) {
        showToast("Failed to save configuration", "error");
      }
    });

    // 5. Test Print Action
    testBtn.addEventListener("click", async () => {
      const value = printerSelect.value;
      if (!value) {
        showToast("Select a printer to test", "info");
        return;
      }

      showToast("Sending test receipt...", "info");
      try {
        const res = await window.printerBridge.testPrint(value);
        if (res && res.success) {
          showToast("Test receipt sent successfully!");
        } else {
          showToast(res.error || "Print task failed", "error");
        }
      } catch (err) {
        showToast("Bridge test failed to execute", "error");
      }
    });

    // 6. Refresh Action
    refreshBtn.addEventListener("click", () => {
      loadPrinters();
      showToast("Printers refreshed!", "info");
    });
  </script>
</body>

</html>
